<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>野菜屋レジ ホーム画面 (管理者ボタン左配置)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">

<body class="bg-stone-100 h-screen w-screen flex flex-col font-sans select-none overflow-hidden">

  <header class="bg-white border-b-2 border-green-600 p-3 flex justify-between items-center shrink-0 shadow-sm">
    <div class="flex items-center space-x-3">
      <div class="w-8 h-8 bg-green-600 rounded flex items-center justify-center text-white font-bold">菜</div>
      <span class="text-lg font-bold text-gray-700 tracking-tighter">新鮮野菜 産直ポス</span>
    </div>
    <div class="flex items-center space-x-8">
      <div class="text-right border-r pr-6 border-gray-200">
        <span id="current-date" class="text-gray-500 text-xs block">----/--/-- (-)</span>
        <span id="current-time" class="text-xl font-mono font-bold text-gray-800">--:--:--</span>
      </div>
      <div class="text-sm bg-gray-100 px-3 py-1 rounded-full text-gray-600">
        レジ担当：yuu

    </div>
  </header>

          <svg xmlns="http://www.w3.org/2000/svg" class="h-24 w-24 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">

          </svg>
        </div>
        <h2 class="text-7xl font-black text-white tracking-[0.2em] mb-2">お会計</h2>
        <p class="text-green-100 text-xl font-bold">Sales Start</p>
      </a>
    </div>
      </button>
    </div>

    <div class="absolute bottom-10 left-10">
       <a href="administrator/masterlogin.html" id="admin-btn" class="bg-purple-600 hover:bg-purple-700 text-white font-bold py-4 px-8 rounded-2xl shadow-md border border-purple-800 flex items-center space-x-3 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">

  <footer class="bg-gray-800 text-white p-3 flex justify-between px-10 shrink-0">
    <div class="flex items-center space-x-6 text-sm">
      <div class="flex items-center">
        <span class="w-2 h-2 bg-green-500 rounded-full mr-2"></span>
        <span>レジ稼働：正常</span>
      </div>
    </div>
    <div class="text-gray-500 text-xs">

    </div>

  <script src="script.js"></script>

</html>
