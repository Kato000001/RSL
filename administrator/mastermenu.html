<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理者用メニュー - 紫テーマ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-purple-50 h-screen w-screen flex flex-col font-sans select-none overflow-hidden text-gray-800">

  <header class="bg-purple-900 p-3 flex justify-between items-center shrink-0 shadow-md text-white">
    <div class="flex items-center space-x-3">
      <div class="w-8 h-8 bg-purple-600 rounded flex items-center justify-center font-bold text-white shadow-inner">管</div>
      <span class="text-lg font-bold tracking-tighter">新鮮野菜 産直ポス - 管理システム</span>
    </div>
    <div class="flex items-center space-x-6">
      <div class="text-right border-r pr-6 border-purple-700">
        <span id="current-date" class="text-purple-300 text-xs block">----/--/-- (-)</span>
        <span id="current-time" class="text-xl font-mono font-bold text-white">--:--:--</span>
      </div>
      <a href="index.html" class="bg-rose-600 hover:bg-rose-700 px-4 py-2 rounded-lg text-sm font-bold transition-all shadow-lg active:scale-95 no-underline text-white">
        ログアウト
      </a>
    </div>
  </header>

  <main class="flex-grow flex flex-col items-center justify-center p-6">
    
    <div class="mb-10 text-center">
      <h2 class="text-4xl font-black text-purple-900 tracking-tight">管理メニュー</h2>
      <p class="text-purple-500 font-bold mt-2">実行する操作を選択してください</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 w-full max-w-4xl">
      
      <a href="data.html" class="bg-white hover:bg-purple-50 border border-purple-100 active:scale-95 transition-all duration-150 rounded-3xl shadow-xl p-10 flex flex-col items-center justify-center group border-b-8 border-purple-600 no-underline">
        <div class="w-24 h-24 bg-purple-100 rounded-2xl flex items-center justify-center mb-6 group-hover:bg-purple-200 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-purple-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
          </svg>
        </div>
        <span class="text-2xl font-black text-purple-900">売上表示</span>
        <span class="text-purple-400 mt-2 text-sm font-bold">本日の売上・取引履歴の確認</span>
      </a>

      <button onclick="alert('商品管理画面（開発中）へ遷移します')" class="bg-white hover:bg-purple-50 border border-purple-100 active:scale-95 transition-all duration-150 rounded-3xl shadow-xl p-10 flex flex-col items-center justify-center group border-b-8 border-indigo-500">
        <div class="w-24 h-24 bg-indigo-50 rounded-2xl flex items-center justify-center mb-6 group-hover:bg-indigo-100 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
          </svg>
        </div>
        <span class="text-2xl font-black text-purple-900">商品登録・価格変更</span>
        <span class="text-purple-400 mt-2 text-sm font-bold">マスタ情報の編集・単価の設定</span>
      </button>

    </div>

  </main>

  <footer class="bg-purple-900 text-purple-300 p-3 text-xs flex justify-between px-8 shrink-0">
    <div class="flex items-center">
        <span class="w-2 h-2 bg-green-400 rounded-full mr-2"></span>
        ログイン中：管理者（店主）
    </div>
    <div class="font-mono">System Version 1.1 (Purple Edition)</div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
