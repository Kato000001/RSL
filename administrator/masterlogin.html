<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理者ログイン - 野菜屋レジ</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-200 h-screen flex flex-col items-center justify-center font-sans select-none overflow-hidden">

  <div class="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-md border border-slate-300">
    
    <div class="text-center mb-8">
      <h1 class="text-3xl font-black text-slate-800 tracking-tighter">管理者ログイン</h1> <p class="text-slate-500 text-sm mt-2 font-bold">パスワードを入力してください</p>
    </div>

    <div class="mb-6">
      <div class="relative">
        <input type="password" readonly placeholder="****" 
          class="w-full bg-slate-100 border-2 border-slate-300 rounded-xl py-4 px-6 text-center text-3xl tracking-[1em] focus:outline-none focus:border-slate-800 transition-colors">
        <span class="absolute -top-3 left-4 bg-white px-2 text-xs font-bold text-slate-400">パスワード入力</span> </div>
    </div>

    <div class="grid grid-cols-3 gap-3 mb-8">
      <button class="bg-slate-100 hover:bg-slate-200 active:bg-slate-300 py-4 rounded-xl text-2xl font-bold border-b-4 border-slate-300 transition-all">7</button>
      <button class="bg-slate-100 hover:bg-slate-200 active:bg-slate-300 py-4 rounded-xl text-2xl font-bold border-b-4 border-slate-300 transition-all">8</button>
      <button class="bg-slate-100 hover:bg-slate-200 active:bg-slate-300 py-4 rounded-xl text-2xl font-bold border-b-4 border-slate-300 transition-all">9</button>
      <button class="bg-slate-100 hover:bg-slate-200 active:bg-slate-300 py-4 rounded-xl text-2xl font-bold border-b-4 border-slate-300 transition-all">4</button>
      <button class="bg-slate-100 hover:bg-slate-200 active:bg-slate-300 py-4 rounded-xl text-2xl font-bold border-b-4 border-slate-300 transition-all">5</button>
      <button class="bg-slate-100 hover:bg-slate-200 active:bg-slate-300 py-4 rounded-xl text-2xl font-bold border-b-4 border-slate-300 transition-all">6</button>
      <button class="bg-slate-100 hover:bg-slate-200 active:bg-slate-300 py-4 rounded-xl text-2xl font-bold border-b-4 border-slate-300 transition-all">1</button>
      <button class="bg-slate-100 hover:bg-slate-200 active:bg-slate-300 py-4 rounded-xl text-2xl font-bold border-b-4 border-slate-300 transition-all">2</button>
      <button class="bg-slate-100 hover:bg-slate-200 active:bg-slate-300 py-4 rounded-xl text-2xl font-bold border-b-4 border-slate-300 transition-all">3</button>
      <button class="bg-rose-100 hover:bg-rose-200 text-rose-700 py-4 rounded-xl text-xl font-bold border-b-4 border-rose-300 transition-all">消去</button>
      <button class="bg-slate-100 hover:bg-slate-200 active:bg-slate-300 py-4 rounded-xl text-2xl font-bold border-b-4 border-slate-300 transition-all">0</button>
      <button class="bg-slate-800 hover:bg-slate-700 text-white py-4 rounded-xl text-xl font-bold border-b-4 border-slate-950 transition-all shadow-lg active:translate-y-1 active:border-b-0">確定</button>
    </div>

    <div class="flex justify-center border-t border-slate-200 pt-6">
      <button class="flex items-center text-slate-500 hover:text-slate-800 font-bold transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-1" viewBox="0 0 20 20" fill="currentColor">
          <path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z" />
        </svg>
        ホームへ戻る </button>
    </div>

  </div>

  <div class="mt-8 text-slate-400 text-xs">
    © 2024 Fresh Veggie POS System - Administration Mode
  </div>

</body>
</html>
