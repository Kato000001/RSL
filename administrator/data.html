<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>売上表示画面 - 野菜屋レジ管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-purple-50 h-screen w-screen flex flex-col font-sans select-none overflow-hidden text-gray-800">

  <header class="bg-purple-900 p-3 flex justify-between items-center shrink-0 shadow-md text-white">
    <div class="flex items-center space-x-3">
      <div class="w-8 h-8 bg-purple-600 rounded flex items-center justify-center font-bold text-white shadow-inner">管</div>
      <span class="text-lg font-bold tracking-tighter">新鮮野菜 産直ポス - 売上管理</span>
    </div>
    <div class="flex items-center space-x-4">
      <span class="text-sm bg-purple-800 px-3 py-1 rounded-full text-purple-200 border border-purple-700">2024年5月20日(月) 稼働中</span>
      
      <a href="mastermenu.html" class="bg-slate-600 hover:bg-slate-700 active:bg-slate-800 active:scale-95 transition-all text-white text-xs font-bold px-4 py-2 rounded-lg shadow-sm no-underline flex items-center">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
        管理者メニューに戻る
      </a>
    </div>
  </header>

  <main class="flex-grow flex flex-col p-6 overflow-hidden">
    
    <div class="grid grid-cols-3 gap-6 mb-6">
      <div class="bg-white p-5 rounded-2xl shadow-sm border-l-8 border-purple-600">
        <p class="text-purple-500 text-xs font-bold uppercase tracking-wider">本日の総売上</p>
        <p class="text-3xl font-black text-purple-900 mt-1">¥ 124,500</p>
      </div>
      <div class="bg-white p-5 rounded-2xl shadow-sm border-l-8 border-indigo-400">
        <p class="text-indigo-400 text-xs font-bold uppercase tracking-wider">客数</p>
        <p class="text-3xl font-black text-indigo-900 mt-1">84 <span class="text-sm">名</span></p>
      </div>
      <div class="bg-white p-5 rounded-2xl shadow-sm border-l-8 border-fuchsia-400">
        <p class="text-fuchsia-400 text-xs font-bold uppercase tracking-wider">客単価</p>
        <p class="text-3xl font-black text-fuchsia-900 mt-1">¥ 1,482</p>
      </div>
    </div>

    <div class="flex-grow bg-white rounded-3xl shadow-xl overflow-hidden flex flex-col border border-purple-100">
      <div class="bg-purple-100 p-4 border-b border-purple-200 flex justify-between items-center">
        <h3 class="font-black text-purple-900 flex items-center">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
          </svg>
          最新の取引履歴
        </h3>
        <button class="text-purple-600 text-sm font-bold hover:underline">CSVダウンロード</button>
      </div>
      
      <div class="overflow-y-auto flex-grow custom-scrollbar">
        <table class="w-full text-left border-collapse">
          <thead class="sticky top-0 bg-purple-50 text-purple-700 text-sm uppercase font-bold">
            <tr>
              <th class="p-4 border-b border-purple-100">時刻</th>
              <th class="p-4 border-b border-purple-100">商品名</th>
              <th class="p-4 border-b border-purple-100 text-right">単価</th>
              <th class="p-4 border-b border-purple-100 text-center">数量</th>
              <th class="p-4 border-b border-purple-100 text-right">小計</th>
              <th class="p-4 border-b border-purple-100 text-right">合計(税込)</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-purple-50">
            <tr class="hover:bg-purple-50 transition-colors">
              <td class="p-4 text-purple-400 font-mono">14:30:12</td>
              <td class="p-4 font-bold">リンゴ</td>
              <td class="p-4 text-right">¥300</td>
              <td class="p-4 text-center">1</td>
              <td class="p-4 text-right text-purple-400">¥300</td>
              <td class="p-4 text-right font-black text-lg border-l border-purple-50 bg-purple-50/30" rowspan="2">¥770</td>
            </tr>
            <tr class="hover:bg-purple-50 transition-colors">
              <td class="p-4 text-purple-400 font-mono">14:30:12</td>
              <td class="p-4 font-bold">キャベツ</td>
              <td class="p-4 text-right">¥200</td>
              <td class="p-4 text-center">2</td>
              <td class="p-4 text-right text-purple-400">¥400</td>
            </tr>
            </tbody>
        </table>
      </div>
    </div>

  </main>

  <footer class="bg-purple-900 text-purple-300 p-2 text-xs flex justify-between px-8">
    <div>売上データ自動更新中...</div>
    <div>最終同期: 14:31:05</div>
  </footer>

</body>
</html>
