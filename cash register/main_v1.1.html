<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>野菜屋レジ - お会計画面 (3分割レイアウト・フィルタ追加)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="checkout_style.css">
</head>
<body class="bg-stone-100 h-screen w-screen flex flex-col font-sans select-none overflow-hidden text-gray-800">

  <header class="bg-white border-b-2 border-green-600 p-3 flex justify-between items-center shrink-0 shadow-sm">
    <div class="flex items-center space-x-3">
      <div class="w-8 h-8 bg-green-600 rounded flex items-center justify-center text-white font-bold">菜</div>
      <span class="text-lg font-bold text-gray-700 tracking-tighter">新鮮野菜 産直ポス</span>
      <span class="ml-4 text-sm font-bold bg-green-100 text-green-800 px-4 py-1 rounded-full border border-green-200">お会計</span>
    </div>
    <div class="flex items-center space-x-6">
      <div class="text-right leading-tight">
        <div id="checkout-date" class="text-sm opacity-80 text-gray-500">----/--/-- (-)</div>
        <div id="checkout-time" class="text-lg font-mono font-bold text-gray-800">--:--:--</div>
      </div>
      <div class="text-sm bg-gray-100 px-3 py-1 rounded-full text-gray-600 border border-gray-200 font-bold">
        担当：店主
      </div>
    </div>
  </header>

  <main class="flex-grow flex p-4 gap-4 overflow-hidden">
    
    <section class="flex-[3] bg-white rounded-xl shadow-md flex flex-col border border-gray-300 overflow-hidden min-w-0">
      <div class="p-3 bg-green-50 border-b border-gray-300 font-bold text-green-800 flex justify-between text-sm">
        <span class="w-[50%]">商品名</span>
        <span class="w-[25%] text-right">単価</span>
        <span class="w-[25%] text-right">金額</span>
      </div>
      
      <div class="flex-grow overflow-y-auto p-4 space-y-3 text-lg">
        <div class="flex items-center border-b border-gray-100 pb-2">
          <div class="w-[50%] font-bold text-gray-800 truncate pr-2">バナナ</div>
          <div class="w-[25%] text-right font-mono text-gray-600 text-base">500</div>
          <div class="w-[25%] text-right font-mono font-bold">500</div>
        </div>
        <div class="flex items-center border-b border-gray-100 pb-2 text-red-600 font-bold text-base">
          <div class="w-[50%] italic truncate pr-2">└ 割引</div>
          <div class="w-[25%] text-right font-mono">ー30</div>
          <div class="w-[25%] text-right font-mono">ー30</div>
        </div>
        <div class="flex items-center border-b border-gray-100 pb-2">
          <div class="w-[50%] font-bold text-gray-800 truncate pr-2">リンゴ</div>
          <div class="w-[25%] text-right font-mono text-gray-600 text-base">300</div>
          <div class="w-[25%] text-right font-mono font-bold">300</div>
        </div>
      </div>

      <div class="p-5 bg-gray-800 text-white space-y-2 shrink-0">
        <div class="flex justify-between items-center text-sm opacity-80">
          <div>税抜：<span class="font-mono text-lg ml-1">780</span></div>
          <div>税込：<span class="font-mono text-lg ml-1">77</span></div>
        </div>
        <div class="flex justify-between items-center border-t border-gray-600 pt-3 mt-1">
          <div class="text-xl font-bold text-green-400">合計金額</div>
          <div class="text-right">
            <span class="text-xl mr-1">￥</span>
            <span class="text-5xl font-mono font-bold text-green-400">857</span>
          </div>
        </div>
        <div class="flex justify-between items-center pt-2 text-gray-300 text-sm">
          <div>預り金：<span class="font-mono ml-2 text-white text-lg">1,000</span></div>
          <div class="text-red-400 font-bold">お釣り：<span class="font-mono ml-2 text-xl">143</span></div>
        </div>
      </div>
    </section>

    <section class="flex-[4] flex flex-col gap-3 min-w-0">
      <div class="bg-white rounded-xl shadow-md border border-gray-300 flex-grow flex flex-col p-4 overflow-hidden">
        
        <div class="flex gap-4 mb-4 shrink-0">
          <div class="grid grid-cols-2 gap-1.5 w-1/3 border-r border-gray-200 pr-4">
            <button class="bg-stone-100 hover:bg-stone-200 text-stone-700 font-bold py-2 rounded-lg border border-stone-300 text-[10px] sm:text-xs transition-colors">全て</button>
            <button class="bg-stone-100 hover:bg-stone-200 text-stone-700 font-bold py-2 rounded-lg border border-stone-300 text-[10px] sm:text-xs transition-colors">季節</button>
            <button class="bg-stone-100 hover:bg-stone-200 text-stone-700 font-bold py-2 rounded-lg border border-stone-300 text-[10px] sm:text-xs transition-colors">通年</button>
            <button class="bg-stone-100 hover:bg-stone-200 text-stone-700 font-bold py-2 rounded-lg border border-stone-300 text-[10px] sm:text-xs transition-colors">種類</button>
          </div>
          
          <div class="grid grid-cols-2 gap-1.5 flex-grow">
            <button class="bg-green-600 text-white font-bold py-2 rounded-lg shadow-sm text-sm">野菜</button>
            <button class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-2 rounded-lg border border-gray-300 transition-colors text-sm">果物</button>
            <button class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-2 rounded-lg border border-gray-300 transition-colors text-sm">特売</button>
            <button class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-2 rounded-lg border border-gray-300 transition-colors text-sm">その他</button>
          </div>
        </div>

        <div class="grid grid-cols-3 gap-3 overflow-y-auto content-start flex-grow pr-1">
          <button class="bg-green-50 hover:bg-green-100 border-2 border-green-200 active:border-green-400 active:scale-95 transition-all rounded-xl py-6 flex flex-col items-center justify-center gap-1" onclick="alert('キャベツを追加しました')">
            <span class="font-bold text-gray-800 text-lg">キャベツ</span>
            <span class="text-sm font-mono text-gray-600">¥200</span>
          </button>
          <button class="bg-green-50 hover:bg-green-100 border-2 border-green-200 active:border-green-400 active:scale-95 transition-all rounded-xl py-6 flex flex-col items-center justify-center gap-1" onclick="alert('大根を追加しました')">
            <span class="font-bold text-gray-800 text-lg">大根</span>
            <span class="text-sm font-mono text-gray-600">¥150</span>
          </button>
          <button class="bg-green-50 hover:bg-green-100 border-2 border-green-200 active:border-green-400 active:scale-95 transition-all rounded-xl py-6 flex flex-col items-center justify-center gap-1" onclick="alert('トマトを追加しました')">
            <span class="font-bold text-gray-800 text-lg">トマト</span>
            <span class="text-sm font-mono text-gray-600">¥100</span>
          </button>
          <button class="bg-green-50 hover:bg-green-100 border-2 border-green-200 active:border-green-400 active:scale-95 transition-all rounded-xl py-6 flex flex-col items-center justify-center gap-1" onclick="alert('きゅうりを追加しました')">
            <span class="font-bold text-gray-800 text-lg">きゅうり</span>
            <span class="text-sm font-mono text-gray-600">¥80</span>
          </button>
          <button class="bg-green-50 hover:bg-green-100 border-2 border-green-200 active:border-green-400 active:scale-95 transition-all rounded-xl py-6 flex flex-col items-center justify-center gap-1" onclick="alert('にんじんを追加しました')">
            <span class="font-bold text-gray-800 text-lg">にんじん</span>
            <span class="text-sm font-mono text-gray-600">¥120</span>
          </button>
          <button class="bg-green-50 hover:bg-green-100 border-2 border-green-200 active:border-green-400 active:scale-95 transition-all rounded-xl py-6 flex flex-col items-center justify-center gap-1" onclick="alert('玉ねぎを追加しました')">
            <span class="font-bold text-gray-800 text-lg">玉ねぎ</span>
            <span class="text-sm font-mono text-gray-600">¥90</span>
          </button>
          <button class="bg-green-50 hover:bg-green-100 border-2 border-green-200 active:border-green-400 active:scale-95 transition-all rounded-xl py-6 flex flex-col items-center justify-center gap-1" onclick="alert('ピーマンを追加しました')">
            <span class="font-bold text-gray-800 text-lg">ピーマン</span>
            <span class="text-sm font-mono text-gray-600">¥150</span>
          </button>
          <button class="bg-green-50 hover:bg-green-100 border-2 border-green-200 active:border-green-400 active:scale-95 transition-all rounded-xl py-6 flex flex-col items-center justify-center gap-1" onclick="alert('なすを追加しました')">
            <span class="font-bold text-gray-800 text-lg">なす</span>
            <span class="text-sm font-mono text-gray-600">¥160</span>
          </button>
          <button class="bg-green-50 hover:bg-green-100 border-2 border-green-200 active:border-green-400 active:scale-95 transition-all rounded-xl py-6 flex flex-col items-center justify-center gap-1" onclick="alert('長ネギを追加しました')">
            <span class="font-bold text-gray-800 text-lg">長ネギ</span>
            <span class="text-sm font-mono text-gray-600">¥110</span>
          </button>
        </div>
      </div>
    </section>

    <section class="flex-[3] flex flex-col gap-3 min-w-0">
      
      <div class="bg-white p-4 rounded-xl shadow-md border-4 border-green-500 relative shrink-0">
        <span class="absolute -top-3 left-4 text-xs font-bold text-white bg-green-500 px-2 py-0.5 rounded">入力中金額</span>
        <div id="input-display" class="text-right text-4xl font-mono font-bold text-gray-800">
          0
        </div>
      </div>

      <div class="grid grid-cols-4 gap-2 flex-grow">
        <button class="bg-white border-b-4 border-gray-300 active:border-b-0 active:translate-y-1 text-2xl font-bold rounded-xl shadow hover:bg-gray-50 flex items-center justify-center" onclick="inputNum('7')">7</button>
        <button class="bg-white border-b-4 border-gray-300 active:border-b-0 active:translate-y-1 text-2xl font-bold rounded-xl shadow hover:bg-gray-50 flex items-center justify-center" onclick="inputNum('8')">8</button>
        <button class="bg-white border-b-4 border-gray-300 active:border-b-0 active:translate-y-1 text-2xl font-bold rounded-xl shadow hover:bg-gray-50 flex items-center justify-center" onclick="inputNum('9')">9</button>
        <button class="bg-red-50 border-b-4 border-red-200 active:border-b-0 active:translate-y-1 text-2xl font-bold rounded-xl shadow hover:bg-red-100 text-red-600 flex items-center justify-center" onclick="clearInput()">×</button>

        <button class="bg-white border-b-4 border-gray-300 active:border-b-0 active:translate-y-1 text-2xl font-bold rounded-xl shadow hover:bg-gray-50 flex items-center justify-center" onclick="inputNum('4')">4</button>
        <button class="bg-white border-b-4 border-gray-300 active:border-b-0 active:translate-y-1 text-2xl font-bold rounded-xl shadow hover:bg-gray-50 flex items-center justify-center" onclick="inputNum('5')">5</button>
        <button class="bg-white border-b-4 border-gray-300 active:border-b-0 active:translate-y-1 text-2xl font-bold rounded-xl shadow hover:bg-gray-50 flex items-center justify-center" onclick="inputNum('6')">6</button>
        <button class="bg-pink-50 border-b-4 border-pink-200 active:border-b-0 active:translate-y-1 text-lg font-bold rounded-xl shadow hover:bg-pink-100 text-pink-700 flex items-center justify-center leading-tight">割引</button>

        <button class="bg-white border-b-4 border-gray-300 active:border-b-0 active:translate-y-1 text-2xl font-bold rounded-xl shadow hover:bg-gray-50 flex items-center justify-center" onclick="inputNum('1')">1</button>
        <button class="bg-white border-b-4 border-gray-300 active:border-b-0 active:translate-y-1 text-2xl font-bold rounded-xl shadow hover:bg-gray-50 flex items-center justify-center" onclick="inputNum('2')">2</button>
        <button class="bg-white border-b-4 border-gray-300 active:border-b-0 active:translate-y-1 text-2xl font-bold rounded-xl shadow hover:bg-gray-50 flex items-center justify-center" onclick="inputNum('3')">3</button>
        <button class="bg-yellow-50 border-b-4 border-yellow-300 active:border-b-0 active:translate-y-1 text-lg font-bold rounded-xl shadow hover:bg-yellow-100 text-yellow-800 flex items-center justify-center leading-tight">戻る</button>

        <button class="col-span-2 bg-white border-b-4 border-gray-300 active:border-b-0 active:translate-y-1 text-2xl font-bold rounded-xl shadow hover:bg-gray-50 flex items-center justify-center" onclick="inputNum('0')">0</button>
        <button class="bg-white border-b-4 border-gray-300 active:border-b-0 active:translate-y-1 text-2xl font-bold rounded-xl shadow hover:bg-gray-50 flex items-center justify-center" onclick="inputNum('00')">00</button>
        <button class="bg-white border-b-4 border-gray-300 active:border-b-0 active:translate-y-1 text-2xl font-bold rounded-xl shadow hover:bg-gray-50 flex items-center justify-center">.</button>

        <button class="col-span-2 bg-green-600 border-b-4 border-green-800 active:border-b-0 active:translate-y-1 text-xl font-bold rounded-xl shadow text-white hover:bg-green-700 flex items-center justify-center tracking-widest h-16">決定</button>
        <button class="col-span-2 bg-emerald-500 border-b-4 border-emerald-700 active:border-b-0 active:translate-y-1 text-xl font-bold rounded-xl shadow text-white hover:bg-emerald-600 flex items-center justify-center tracking-tighter h-16">次のページ</button>
      </div>

      <div class="grid grid-cols-2 gap-2 shrink-0">
        <button class="bg-gray-500 border-b-4 border-gray-700 active:border-b-0 active:translate-y-1 text-base font-bold rounded-xl shadow text-white py-3">税込み</button>
        <a href="../index.html" class="bg-slate-700 border-b-4 border-slate-900 active:border-b-0 active:translate-y-1 text-base font-bold rounded-xl shadow text-white py-3 flex flex-col items-center justify-center leading-tight text-center decoration-none">
            ホーム画面<br><span class="text-xs opacity-80">に戻る</span>
        </a>
      </div>

    </section>
  </main>

  <footer class="bg-gray-800 text-white p-2 text-sm flex justify-between px-6 shrink-0">
    <div class="flex items-center space-x-2">
      <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
      <span>オンライン稼働中</span>
    </div>
  </footer>

  <script src="checkout_script.js"></script>
</body>
</html>
