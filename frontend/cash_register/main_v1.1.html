<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>野菜屋レジ - お会計画面</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* 中央エリアのグレーアウト（無効化） */
    .lock-overlay {
        pointer-events: none; /* クリック無効 */
        filter: grayscale(100%) opacity(0.4); /* 白黒にして薄くする */
        transition: all 0.3s ease;
    }

    /* 左下合計エリアの強調 */
    .active-summary {
        transform: scale(1.02);
        box-shadow: 0 -4px 20px rgba(59, 130, 246, 0.5); /* 青い光 */
        border: 2px solid #3b82f6; /* 青枠 */
        z-index: 10;
        transition: all 0.3s ease;
    }
  </style>
</head>
<body class="bg-stone-100 h-screen w-screen flex flex-col font-sans select-none overflow-hidden text-gray-800">

 <header class="bg-white border-b-2 border-green-600 p-3 flex justify-between items-center shrink-0 shadow-sm">
    <div class="flex items-center space-x-3">
      <div class="w-8 h-8 bg-green-600 rounded flex items-center justify-center text-white font-bold">菜</div>
      <span class="text-lg font-bold text-gray-700 tracking-tighter">新鮮野菜 産直ポス</span>
      <span class="text-sm font-bold bg-green-100 text-green-800 px-4 py-1 rounded-full border border-green-200">お会計</span>
    </div>

    <div class="flex items-center space-x-6">
      <div class="text-right leading-tight">
        <div id="checkout-date" class="text-sm opacity-80 text-gray-500">----/--/-- (-)</div>
        <div id="checkout-time" class="text-lg font-mono font-bold text-gray-800">--:--:--</div>
      </div>
      
      <a href="../index.html" class="bg-slate-600 hover:bg-slate-700 active:bg-slate-800 active:scale-95 transition-all text-white text-sm font-bold px-4 py-2 rounded-lg shadow-sm decoration-none flex items-center">
      ホームに戻る
      </a>
    </div>
  </header>

  <main class="flex-grow flex p-4 gap-4 overflow-hidden">
    
    <section class="flex-[3] bg-white rounded-xl shadow-md flex flex-col border border-gray-300 overflow-hidden min-w-0">
      <div class="p-3 bg-green-50 border-b border-gray-300 font-bold text-green-800 flex justify-between text-sm">
        <span class="w-[50%]">商品名</span>
        <span class="w-[25%] text-right">単価</span>
        <span class="w-[25%] text-right">金額</span>
      </div>
      
      <div id="receipt-list" class="flex-grow overflow-y-auto p-4 space-y-3 text-lg">
        </div>

      <div id="price-summary" class="p-5 bg-gray-800 text-white space-y-2 shrink-0 rounded-b-xl relative transition-all duration-300">
        <div class="flex justify-between items-center text-sm opacity-80">
          <div>税抜：<span id="subtotal-display" class="font-mono text-lg ml-1">0</span></div>
          <div>税込：<span id="tax-display" class="font-mono text-lg ml-1">0</span></div>
        </div>
        <div class="flex justify-between items-center border-t border-gray-600 pt-3 mt-1">
          <div class="text-xl font-bold text-green-400">合計金額</div>
          <div class="text-right">
            <span class="text-xl mr-1">￥</span>
            <span id="total-display" class="text-5xl font-mono font-bold text-green-400">0</span>
          </div>
        </div>
        <div class="flex justify-between items-center pt-2 text-gray-300 text-sm">
          <div>預り金：<span id="tendered-display" class="font-mono ml-2 text-white text-lg">0</span></div>
          <div class="text-red-400 font-bold">お釣り：<span id="change-display" class="font-mono ml-2 text-xl">0</span></div>
       </div>
      </div>
    </section>

    <section id="product-area" class="flex-[4] flex flex-col gap-3 min-w-0 transition-all duration-300">
      <div class="bg-white rounded-xl shadow-md border border-gray-300 flex-grow flex flex-col p-4 overflow-hidden">
        
        <div class="grid grid-cols-4 gap-2 bg-slate-100 p-2 rounded-xl shrink-0">
          <button class="filter-btn py-2 text-sm font-bold rounded-lg border border-slate-200 bg-white text-slate-600 hover:bg-slate-50 transition" data-filter="全て">全て</button>
          <button class="filter-btn py-2 text-sm font-bold rounded-lg border border-slate-200 bg-white text-slate-600 hover:bg-slate-50 transition" data-filter="野菜">野菜</button>
          <button class="filter-btn py-2 text-sm font-bold rounded-lg border border-slate-200 bg-white text-slate-600 hover:bg-slate-50 transition" data-filter="果物">果物</button>
          <button class="filter-btn py-2 text-sm font-bold rounded-lg border border-slate-200 bg-white text-slate-600 hover:bg-slate-50 transition" data-filter="その他">その他</button>
  
          <button class="filter-btn py-2 text-sm font-bold rounded-lg border border-slate-200 bg-white text-slate-600 hover:bg-slate-50 transition" data-filter="春">春</button>
          <button class="filter-btn py-2 text-sm font-bold rounded-lg border border-slate-200 bg-white text-slate-600 hover:bg-slate-50 transition" data-filter="夏">夏</button>
          <button class="filter-btn py-2 text-sm font-bold rounded-lg border border-slate-200 bg-white text-slate-600 hover:bg-slate-50 transition" data-filter="秋">秋</button>
          <button class="filter-btn py-2 text-sm font-bold rounded-lg border border-slate-200 bg-white text-slate-600 hover:bg-slate-50 transition" data-filter="冬">冬</button>
        </div>

        <div class="grid grid-cols-3 gap-3 overflow-y-auto content-start flex-grow pr-1">
          <button class="bg-green-50 hover:bg-green-100 border-2 border-green-200 active:border-green-400 active:scale-95 transition-all rounded-xl py-6 flex flex-col items-center justify-center gap-1" onclick="addProduct('キャベツ', 200)">
            <span class="font-bold text-gray-800 text-lg">キャベツ</span>
            <span class="text-sm font-mono text-gray-600">¥200</span>
          </button>
          <button class="bg-green-50 hover:bg-green-100 border-2 border-green-200 active:border-green-400 active:scale-95 transition-all rounded-xl py-6 flex flex-col items-center justify-center gap-1" onclick="addProduct('大根', 150)">
            <span class="font-bold text-gray-800 text-lg">大根</span>
            <span class="text-sm font-mono text-gray-600">¥150</span>
          </button>
          <button class="bg-green-50 hover:bg-green-100 border-2 border-green-200 active:border-green-400 active:scale-95 transition-all rounded-xl py-6 flex flex-col items-center justify-center gap-1" onclick="addProduct('トマト', 100)">
            <span class="font-bold text-gray-800 text-lg">トマト</span>
            <span class="text-sm font-mono text-gray-600">¥100</span>
          </button>
          <button class="bg-green-50 hover:bg-green-100 border-2 border-green-200 active:border-green-400 active:scale-95 transition-all rounded-xl py-6 flex flex-col items-center justify-center gap-1" onclick="addProduct('きゅうり', 80)">
            <span class="font-bold text-gray-800 text-lg">きゅうり</span>
            <span class="text-sm font-mono text-gray-600">¥80</span>
          </button>
          <button class="bg-green-50 hover:bg-green-100 border-2 border-green-200 active:border-green-400 active:scale-95 transition-all rounded-xl py-6 flex flex-col items-center justify-center gap-1" onclick="addProduct('にんじん', 120)">
            <span class="font-bold text-gray-800 text-lg">にんじん</span>
            <span class="text-sm font-mono text-gray-600">¥120</span>
          </button>
          <button class="bg-green-50 hover:bg-green-100 border-2 border-green-200 active:border-green-400 active:scale-95 transition-all rounded-xl py-6 flex flex-col items-center justify-center gap-1" onclick="addProduct('玉ねぎ', 90)">
            <span class="font-bold text-gray-800 text-lg">玉ねぎ</span>
            <span class="text-sm font-mono text-gray-600">¥90</span>
          </button>
          <button class="bg-green-50 hover:bg-green-100 border-2 border-green-200 active:border-green-400 active:scale-95 transition-all rounded-xl py-6 flex flex-col items-center justify-center gap-1" onclick="addProduct('ピーマン', 150)">
            <span class="font-bold text-gray-800 text-lg">ピーマン</span>
            <span class="text-sm font-mono text-gray-600">¥150</span>
          </button>
          <button class="bg-green-50 hover:bg-green-100 border-2 border-green-200 active:border-green-400 active:scale-95 transition-all rounded-xl py-6 flex flex-col items-center justify-center gap-1" onclick="addProduct('なす', 160)">
            <span class="font-bold text-gray-800 text-lg">なす</span>
            <span class="text-sm font-mono text-gray-600">¥160</span>
          </button>
          <button class="bg-green-50 hover:bg-green-100 border-2 border-green-200 active:border-green-400 active:scale-95 transition-all rounded-xl py-6 flex flex-col items-center justify-center gap-1" onclick="addProduct('長ネギ', 110)">
            <span class="font-bold text-gray-800 text-lg">長ネギ</span>
            <span class="text-sm font-mono text-gray-600">¥110</span>
          </button>
        </div>
      </div>
    </section>

    <section class="flex-[3] flex flex-col gap-3 min-w-0">
      
      <div id="input-container" class="bg-white p-4 rounded-xl shadow-md border-4 border-green-500 relative shrink-0 transition-colors duration-300">
        <span id="mode-badge" class="absolute -top-3 left-4 text-xs font-bold text-white bg-green-500 px-2 py-0.5 rounded transition-colors duration-300">入力中金額</span>
        <div id="input-display" class="text-right text-4xl font-mono font-bold text-gray-800 transition-colors duration-300">
          0
        </div>
      </div>

      <div class="grid grid-cols-4 gap-2 flex-grow">
        <button class="bg-white border-b-4 border-gray-300 active:border-b-0 active:translate-y-1 text-2xl font-bold rounded-xl shadow hover:bg-gray-50 flex items-center justify-center" onclick="inputNum('7')">7</button>
        <button class="bg-white border-b-4 border-gray-300 active:border-b-0 active:translate-y-1 text-2xl font-bold rounded-xl shadow hover:bg-gray-50 flex items-center justify-center" onclick="inputNum('8')">8</button>
        <button class="bg-white border-b-4 border-gray-300 active:border-b-0 active:translate-y-1 text-2xl font-bold rounded-xl shadow hover:bg-gray-50 flex items-center justify-center" onclick="inputNum('9')">9</button>
        <button class="bg-red-50 border-b-4 border-red-200 active:border-b-0 active:translate-y-1 text-base font-bold rounded-xl shadow hover:bg-red-100 text-red-600 flex flex-col items-center justify-center leading-tight" onclick="clearCart()">全取消<span class="text-xs font-mono">AC</span></button>

        <button class="bg-white border-b-4 border-gray-300 active:border-b-0 active:translate-y-1 text-2xl font-bold rounded-xl shadow hover:bg-gray-50 flex items-center justify-center" onclick="inputNum('4')">4</button>
        <button class="bg-white border-b-4 border-gray-300 active:border-b-0 active:translate-y-1 text-2xl font-bold rounded-xl shadow hover:bg-gray-50 flex items-center justify-center" onclick="inputNum('5')">5</button>
        <button class="bg-white border-b-4 border-gray-300 active:border-b-0 active:translate-y-1 text-2xl font-bold rounded-xl shadow hover:bg-gray-50 flex items-center justify-center" onclick="inputNum('6')">6</button>
        <button class="bg-yellow-50 border-b-4 border-yellow-300 active:border-b-0 active:translate-y-1 text-base font-bold rounded-xl shadow hover:bg-yellow-100 text-yellow-800 flex flex-col items-center justify-center leading-tight" onclick="clearInput()">入力<br>クリア</button>

        <button class="bg-white border-b-4 border-gray-300 active:border-b-0 active:translate-y-1 text-2xl font-bold rounded-xl shadow hover:bg-gray-50 flex items-center justify-center" onclick="inputNum('1')">1</button>
        <button class="bg-white border-b-4 border-gray-300 active:border-b-0 active:translate-y-1 text-2xl font-bold rounded-xl shadow hover:bg-gray-50 flex items-center justify-center" onclick="inputNum('2')">2</button>
        <button class="bg-white border-b-4 border-gray-300 active:border-b-0 active:translate-y-1 text-2xl font-bold rounded-xl shadow hover:bg-gray-50 flex items-center justify-center" onclick="inputNum('3')">3</button>
        <button class="bg-orange-50 border-b-4 border-orange-200 active:border-b-0 active:translate-y-1 text-base font-bold rounded-xl shadow hover:bg-orange-100 text-orange-700 flex flex-col items-center justify-center leading-tight" onclick="removeLastItem()">商品を1つ<br>取消</button>

       <button class="bg-white border-b-4 border-gray-300 active:border-b-0 active:translate-y-1 text-2xl font-bold rounded-xl shadow hover:bg-gray-50 flex items-center justify-center" onclick="inputNum('0')">0</button>
        <button class="col-span-2 bg-white border-b-4 border-gray-300 active:border-b-0 active:translate-y-1 text-2xl font-bold rounded-xl shadow hover:bg-gray-50 flex items-center justify-center" onclick="inputNum('00')">00</button>
        <button class="bg-blue-600 border-b-4 border-blue-800 active:border-b-0 active:translate-y-1 text-base font-bold rounded-xl shadow hover:bg-blue-700 text-white flex items-center justify-center leading-tight tracking-tighter" onclick="setTenderedAmount()">預り金</button>
        <button class="col-span-4 bg-pink-50 border-b-4 border-pink-200 active:border-b-0 active:translate-y-1 text-xl font-bold rounded-xl shadow hover:bg-pink-100 text-pink-700 flex items-center justify-center tracking-widest" onclick="applyDefaultPrice()">定額</button>
        <button id="btn-confirm" class="col-span-2 bg-orange-500 border-b-4 border-orange-700 active:border-b-0 active:translate-y-1 text-xl font-bold rounded-xl shadow text-white hover:bg-orange-600 flex items-center justify-center tracking-tighter h-16" onclick="confirmPrice()">決定</button>
        <button class="col-span-2 bg-emerald-500 border-b-4 border-emerald-700 active:border-b-0 active:translate-y-1 text-xl font-bold rounded-xl shadow text-white hover:bg-emerald-600 flex items-center justify-center tracking-tighter h-16" onclick="goToCheckout()">お会計</button>

    </section>
  </main>

  <footer class="bg-gray-800 text-white p-2 text-sm flex justify-between px-6 shrink-0">
    <div class="flex items-center space-x-2">
      <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
      <span>オンライン稼働中</span>
    </div>
  </footer>

  <script src="pos_script.js"></script>
</body>
</html>
