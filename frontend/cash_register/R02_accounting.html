<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>野菜屋レジ お会計完了</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=M+PLUS+1+Code:wght@400;700&display=swap');
    .receipt-font { font-family: 'M PLUS 1 Code', 'Courier New', Courier, monospace; }
    .paper-texture {
      background-color: #ffffff;
      background-image: radial-gradient(#f0f0f0 1px, transparent 0);
      background-size: 10px 10px;
    }

    /* ＝＝＝ ここから印刷・PDF化用の特別な設定 ＝＝＝ */
    @media print {
      /* 印刷時に「no-print」クラスがついた要素（ボタンやヘッダーなど）を非表示にする */
      .no-print {
        display: none !important;
      }
      /* 背景のグレーやグラデーションを消して真っ白にする */
      body, main {
        background: white !important;
        height: auto !important;
        overflow: visible !important;
        padding: 0 !important;
      }
      /* レシート部分の影や無駄な余白を消して、紙の左上に詰めて綺麗に印刷されるようにする */
      .paper-texture {
        box-shadow: none !important;
        width: 100% !important;
        max-width: 300px; /* 実際のレシート用紙の幅に近いサイズ */
        margin: 0 auto;
        padding: 10px !important;
      }
    }
    /* ＝＝＝ ここまで ＝＝＝ */
  </style>
</head>
<body class="bg-stone-100 h-screen w-screen flex flex-col font-sans select-none overflow-hidden text-gray-800">

  <header class="bg-white border-b-2 border-green-600 p-3 flex justify-between items-center shrink-0 shadow-sm no-print ">
    <div class="flex items-center space-x-4">
        <div class="w-8 h-8 bg-green-600 rounded flex items-center justify-center text-white font-bold">菜</div>
        <span class="text-lg font-bold text-gray-700 tracking-tighter">新鮮野菜 産直ポス</span>
    </div>
    <div class="text-sm bg-green-50 px-4 py-1.5 rounded-full text-green-700 font-bold border border-green-200">
      お会計完了
    </div>
  </header>

  <main class="flex-grow flex p-8 gap-10 overflow-hidden bg-gradient-to-br from-stone-50 to-stone-200">
    <section class="flex-grow flex flex-col items-center justify-center space-y-10 no-print ">
      <div class="w-64 h-64 bg-green-100 rounded-full flex items-center justify-center shadow-inner relative">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-48 h-48 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <div class="absolute -bottom-4 bg-white px-6 py-2 rounded-full shadow-md border border-gray-100 font-bold text-green-700 animate-bounce">
          ありがとうございました！
        </div>
      </div>

      <div class="text-center space-y-4 ">
        <h2 class="text-4xl font-black text-gray-800 tracking-wider">お買い上げありがとうございます</h2>
        <div class="bg-white p-8 rounded-3xl shadow-xl border-t-8 border-green-500 inline-block px-16">
          <p class="text-gray-500 font-bold mb-2">お会計金額</p>
          <div class="flex items-baseline justify-center">
            <span class="text-2xl font-bold mr-2">￥</span>
            <span id="result-total" class="text-7xl font-black text-green-700 tracking-tighter">0</span>
          </div>
        </div>
      </div>

      <div class="flex gap-6 w-full max-w-md pt-6">
        <a href="../main_home.html" class="flex-1 bg-white hover:bg-gray-50 border-b-4 border-gray-300 active:border-b-0 active:translate-y-1 py-5 rounded-2xl shadow-lg font-bold text-2xl text-gray-600 flex items-center justify-center gap-3">ホーム</a>
        <a href="R01_input.html" class="flex-1 bg-green-600 hover:bg-green-700 border-b-4 border-green-800 active:border-b-0 active:translate-y-1 py-5 rounded-2xl shadow-lg font-bold text-2xl text-white flex items-center justify-center gap-3">次のお会計へ</a>
      </div>
    </section>

    <section class="w-96 flex flex-col items-center">
      <div class="bg-blue-900 text-white w-full py-2 px-4 rounded-t-xl text-center text-sm font-bold tracking-widest no-print ">レシートプレビュー</div>
      <div class="w-full bg-white shadow-xl p-8 flex flex-col paper-texture receipt-font text-gray-700 relative overflow-hidden">
        
        <div class="text-center mb-6 space-y-1">
          <p class="text-xl font-bold">新鮮野菜 産直ポス</p>
          <p class="text-xs">横浜市元町 1-2-3</p>
          <div class="border-b border-dashed border-gray-300 pt-2"></div>
        </div>

        <div id="result-items" class="space-y-2 mb-6 min-h-[100px]"></div>

        <div class="border-b border-dashed border-gray-300 mb-4"></div>

        <div class="space-y-1 text-sm mb-4">
          <div class="flex justify-between"><span>税抜金額</span><span id="result-subtotal">￥0</span></div>
          <div class="flex justify-between"><span>消費税(8%)</span><span id="result-tax">￥0</span></div>
        </div>

        <div class="flex justify-between items-center border-y-2 border-black py-2 mb-4">
          <span class="text-lg font-bold">合計金額</span>
          <span id="result-receipt-total" class="text-2xl font-black">￥0</span>
        </div>

        <div class="space-y-1 mb-8">
          <div class="flex justify-between"><span>お預かり金</span><span id="result-tendered">￥0</span></div>
          <div class="flex justify-between text-lg font-bold"><span>お釣り</span><span id="result-change">￥0</span></div>
        </div>

        <div class="text-center text-xs space-y-2">
          <p id="result-datetime">印字日時: ----/--/-- --:--</p>
          <p class="pt-4 font-bold border-t border-dotted border-gray-400">またのお越しをお待ちしております</p>
        </div>
      </div>

            <button onclick="printReceipt()" class="no-print mt-4 w-full bg-stone-700 border-b-4 border-stone-900 active:border-b-0 active:translate-y-1 py-4 rounded-xl shadow-lg font-bold text-lg text-white flex items-center justify-center gap-2 hover:bg-stone-600 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" />
            </svg>
            レシートを印刷 / PDF保存
            </button>

    </section>
  </main>
    <footer class="bg-gray-800 text-white p-3 flex justify-between px-10 shrink-0">
    <div class="flex items-center space-x-6 text-sm">
      <div class="flex items-center">
      </div>
    </div>
    <div class="text-gray-500 text-xs items-right">
      Pos Mode
    </div>
  </footer>
  <script src="pos_script.js"></script>
  <script>
    function printReceipt() {
        // 現在のページタイトル（「野菜屋レジ お会計完了」）を記憶しておく
        const originalTitle = document.title;
        
        // 現在の日時を取得
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        
        // 保存されるファイル名を作成（PCで保存可能な文字の組み合わせ）
        const fileName = `レシート_${year}年${month}月${day}日_${hours}時${minutes}分`;
        
        // ページタイトルを一瞬だけファイル名に書き換える
        document.title = fileName;
        
        // 印刷（PDF保存）の画面を開く
        window.print();
        
        // 印刷画面が開き終わったら、タイトルを元の「野菜屋レジ お会計完了」に戻す
        setTimeout(() => {
            document.title = originalTitle;
        }, 1000);
    }
  </script>
</body>
</html>
