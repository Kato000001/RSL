<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品追加・変更 - 野菜屋レジ管理</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="admin-mode">

    <header class="main-header">
        <div class="header-left">
            <div class="logo">管</div>
            <h1 class="page-title">新鮮野菜 産直ポス - 商品追加・変更</h1>
        </div>

        <div class="header-right">
            <div class="datetime-display">
                <div id="current-date" class="date">2026/05/15 (金)</div>
                <div id="current-time" class="time">10:53:56</div>
            </div>
            <a href="A02_admin_home.html" class="logout-button">管理者メニューへ戻る</a>
        </div>
    </header>

    <main class="main-container">
        
        <section class="inventory-section">
            <div class="filter-bar">
                <span class="filter-label">フィルタリング:</span>
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="全て">全て</button>
                    <button class="filter-btn" data-filter="野菜">野菜</button>
                    <button class="filter-btn" data-filter="果物">果物</button>
                    <button class="filter-btn" data-filter="その他">その他</button>
                    <button class="filter-btn" data-filter="春">春</button>
                    <button class="filter-btn" data-filter="夏">夏</button>
                    <button class="filter-btn" data-filter="秋">秋</button>
                    <button class="filter-btn" data-filter="冬">冬</button>
                    <button class="filter-btn" data-filter="通年">通年</button>
                </div>
            </div>

            <div class="table-card">
                <div class="scroll-area custom-scrollbar">
                    <table class="product-table">
                        <thead>
                            <tr>
                                <th class="col-id sortable">ID</th>
                                <th class="col-name sortable">名前</th>
                                <th class="col-price sortable">値段</th>
                                <th class="col-attr">属性</th>
                            </tr>
                        </thead>
                        <tbody>
                            </tbody>
                    </table>
                </div>
            </div>
        </section>

        <section class="editor-section">
            <div class="editor-card">
                <div class="card-header">
                    <h2 class="card-title">商品詳細・編集</h2>
                    <span class="helper-text">※テンキーまたはキーボードで入力</span>
                </div>
                
                <div class="card-body custom-scrollbar">
                    <div class="form-group-row">
                        <label class="form-label">ID</label>
                        <input type="text" value="" class="input-field input-readonly" readonly>
                    </div>
                    <div class="form-group-row">
                        <label class="form-label">名前</label>
                        <input type="text" value="" class="input-field input-text">
                    </div>
                    <div class="form-group-row">
                        <label class="form-label">値段</label>
                        <div class="input-with-unit">
                            <input type="number" value="" class="input-field input-number">
                            <span class="unit">円</span>
                        </div>
                    </div>

                    <div class="attr-grid">
                        <div class="attr-box">
                            <span class="box-label">季節属性</span>
                            <div class="checkbox-group">
                                <label><input type="checkbox"> 春</label>
                                <label><input type="checkbox"> 夏</label>
                                <label><input type="checkbox"> 秋</label>
                                <label><input type="checkbox"> 冬</label>
                                <label><input type="checkbox"> 通年</label>
                            </div>
                        </div>

                        <div class="attr-box">
                            <span class="box-label">種類</span>
                            <div class="radio-group">
                                <label><input type="radio" name="cat"> 野菜</label>
                                <label><input type="radio" name="cat"> 果物</label>
                                <label><input type="radio" name="cat"> その他</label>
                            </div>
                        </div>
                    </div>

                    </div>

                <div class="card-footer">
                    <button class="btn-action btn-add">新規追加</button>
                    <button class="btn-action btn-delete">削除</button>
                    <button class="btn-action btn-clear">クリア</button>
                    <button class="btn-action btn-submit">変更を決定</button>
                </div>
            </div>
        </section>
    </main>

<footer class="admin-footer">
  <div class="footer-left">
    </div>
  <div class="footer-right">Admin Mode</div>
</footer>

    <script src="admin_script.js"></script>
</body>
</html>
