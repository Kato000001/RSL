<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>税率設定 - 野菜屋レジ管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-purple-50 h-screen w-screen flex flex-col font-sans select-none overflow-hidden text-gray-800">

  <header class="main-header flex-shrink-0">
    <div class="header-left">
      <div class="logo">管</div>
      <h1 class="page-title">新鮮野菜 産直ポス - 税率設定</h1>
    </div>
    <div class="header-right">
      <div class="datetime-display">
        <div id="current-date" class="date">----/--/-- (-)</div>
        <div id="current-time" class="time">--:--:--</div>
      </div>
      <a href="A02_admin_home.html" class="logout-button">管理者メニューへ戻る</a>
    </div>
  </header>

  <main class="flex-grow flex flex-col items-center justify-start md:justify-center p-4 md:p-8 overflow-y-auto">

    <div class="w-full max-w-lg my-auto">

      <div class="bg-white rounded-3xl shadow-xl border border-purple-100 p-6 md:p-8 mb-4 md:mb-6">
        <div class="flex items-center gap-3 mb-4 md:mb-6">
          <div class="w-10 h-10 bg-purple-100 rounded-xl flex items-center justify-center flex-shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-purple-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 11h.01M12 11h.01M15 11h.01M4 19h16a2 2 0 002-2V7a2 2 0 00-2-2H4a2 2 0 00-2 2v10a2 2 0 002 2z" />
            </svg>
          </div>
          <div>
            <h2 class="text-xl font-black text-purple-900">現在の税率</h2>
            <p class="text-purple-400 text-xs font-bold">データベースから取得</p>
          </div>
        </div>

        <div id="current-rate-display" class="bg-purple-50 rounded-2xl p-4 md:p-6 text-center border border-purple-100">
          <p class="text-purple-400 text-sm font-bold mb-1">消費税率</p>
          <div class="flex items-baseline justify-center gap-1">
            <p class="text-5xl md:text-6xl font-black text-purple-800" id="current-rate-value">--</p>
            <p class="text-purple-500 text-xl font-bold">%</p>
          </div>
        </div>

        <p id="load-error" class="text-rose-500 text-sm font-bold text-center mt-3 hidden">税率の取得に失敗しました</p>
      </div>

      <div class="bg-white rounded-3xl shadow-xl border border-purple-100 p-6 md:p-8">
        <div class="flex items-center gap-3 mb-4 md:mb-6">
          <div class="w-10 h-10 bg-indigo-100 rounded-xl flex items-center justify-center flex-shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
            </svg>
          </div>
          <div>
            <h2 class="text-xl font-black text-purple-900">税率を変更する</h2>
            <p class="text-purple-400 text-xs font-bold">半角数字で入力してください（例：8、10）</p>
          </div>
        </div>

        <div class="mb-4 md:mb-6">
          <div class="relative">
            <input
              id="new-rate-input"
              type="number"
              min="0"
              max="99"
              step="1"
              placeholder="例：10"
              class="w-full bg-purple-50 border-2 border-purple-200 rounded-xl py-3 md:py-4 px-6 text-center text-3xl md:text-4xl font-black focus:outline-none focus:border-purple-600 transition-colors text-purple-900 placeholder-purple-200"
            >
            <span class="absolute right-6 top-1/2 -translate-y-1/2 text-2xl font-black text-purple-400">%</span>
            <span class="absolute -top-3 left-4 bg-white px-2 text-xs font-bold text-purple-400">新しい税率</span>
          </div>
          <p id="error-msg" class="text-rose-500 text-sm font-bold mt-2 text-center hidden">0〜99の整数を入力してください</p>
        </div>

        <div class="grid grid-cols-4 gap-3 mb-4 md:mb-6">
          <button onclick="setRate(5)"  class="quick-btn">5%</button>
          <button onclick="setRate(8)"  class="quick-btn">8%</button>
          <button onclick="setRate(10)" class="quick-btn">10%</button>
          <button onclick="setRate(0)"  class="quick-btn">0%</button>
        </div>

        <button
          id="save-btn"
          onclick="saveTaxRate()"
          class="w-full bg-purple-700 hover:bg-purple-800 active:translate-y-1 text-white font-black text-xl py-4 md:py-5 rounded-2xl shadow-lg border-b-4 border-purple-900 transition-all flex items-center justify-center gap-3 flex-shrink-0"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
          </svg>
          変更を保存する
        </button>

        <div id="success-msg" class="hidden mt-4 bg-green-50 border border-green-200 rounded-xl p-4 text-center">
          <p class="text-green-700 font-bold">✅ 税率を更新しました！レジに即時反映されます。</p>
        </div>
      </div>

      <div class="mt-4 bg-amber-50 border border-amber-200 rounded-xl p-4 mb-4">
        <p class="text-amber-700 text-sm font-bold">⚠️ 注意：変更した税率はお会計画面を開いた際に自動的に反映されます。</p>
      </div>
    </div>
  </main>

  <footer class="admin-footer flex-shrink-0">
    <div class="footer-left"></div>
    <div class="footer-right">Admin Mode</div>
  </footer>

  <style>
    .quick-btn {
      background-color: #f3f0ff;
      color: #6d28d9;
      border: 2px solid #ddd6fe;
      border-radius: 12px;
      padding: 10px;
      font-size: 1rem;
      font-weight: 900;
      cursor: pointer;
      transition: all 0.15s;
    }
    .quick-btn:hover { background-color: #ede9fe; }
    .quick-btn:active { transform: scale(0.95); }
    .quick-btn-active {
      background-color: #7c3aed;
      color: white;
      border-color: #5b21b6;
    }
  </style>

  <script src="admin_script.js"></script>
  <script>
    const TAX_API_URL = 'http://localhost/RSL/backend/api/tax_api.php';

    // ページ読み込み時に現在の税率取得
    window.addEventListener('DOMContentLoaded', async () => {
      try {
        const res = await fetch(TAX_API_URL);
        const data = await res.json();
        if (data.success) {
          document.getElementById('current-rate-value').textContent = data.tax_rate;
          document.getElementById('new-rate-input').value = data.tax_rate;
        } else {
          document.getElementById('load-error').classList.remove('hidden');
        }
      } catch (e) {
        document.getElementById('load-error').classList.remove('hidden');
        console.error('税率取得エラー:', e);
      }
    });

    // クイック選択ボタン
    function setRate(val) {
      document.getElementById('new-rate-input').value = val;
      document.getElementById('error-msg').classList.add('hidden');
      document.getElementById('success-msg').classList.add('hidden');
    }

    // 保存処理
    async function saveTaxRate() {
      const input = document.getElementById('new-rate-input');
      const val = parseInt(input.value, 10);
      const errorMsg = document.getElementById('error-msg');
      const successMsg = document.getElementById('success-msg');
      const saveBtn = document.getElementById('save-btn');

      errorMsg.classList.add('hidden');
      successMsg.classList.add('hidden');

      if (isNaN(val) || val < 0 || val > 99) {
        errorMsg.classList.remove('hidden');
        return;
      }

      saveBtn.disabled = true;
      saveBtn.textContent = '保存中...';

      try {
        const res = await fetch(TAX_API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ tax_rate: val })
        });
        const data = await res.json();

        if (data.success) {
          document.getElementById('current-rate-value').textContent = val;
          successMsg.classList.remove('hidden');
        } else {
          alert('保存エラー: ' + data.error);
        }
      } catch (e) {
        alert('通信エラーが発生しました。');
        console.error(e);
      } finally {
        saveBtn.disabled = false;
        saveBtn.innerHTML = `
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
          </svg>
          変更を保存する
        `;
      }
    }
  </script>
</body>
</html>
