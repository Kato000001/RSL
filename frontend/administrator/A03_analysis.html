<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>売上分析画面 - 野菜屋レジ管理</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .custom-scrollbar::-webkit-scrollbar { width: 8px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: #f5f3ff; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #ddd6fe; border-radius: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #c4b5fd; }
    
    .detail-row {
      display: none;
      background-color: #fafafa;
    }
    .summary-row {
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .summary-row:hover {
      background-color: #f3e8ff !important;
    }
    .toggle-icon {
      transition: transform 0.2s;
    }
    .rotated {
      transform: rotate(90deg);
    }
    .group-separator-row {
      border-bottom: 2px solid #ddd6fe !important; 
    }
  </style>
</head>
<body class="bg-violet-50 h-screen w-screen flex flex-col font-sans select-none overflow-hidden text-slate-800">

    <header class="main-header">
        <div class="header-left">
            <div class="logo">管</div>
            <h1 class="page-title">新鮮野菜 産直ポス - 売上管理システム</h1>
        </div>

        <div class="header-right">
            <div class="datetime-display">
                <div id="current-date" class="date">2026/05/15 (金)</div>
                <div id="current-time" class="time">10:53:56</div>
            </div>
            <a href="A02_admin_home.html" class="logout-button">管理者メニューへ戻る</a>
        </div>
    </header>

  <main class="flex-grow flex flex-col p-8 overflow-hidden">
    
    <div class="flex justify-center mb-6 shrink-0">
      <div class="bg-white p-1 rounded-xl shadow-md border border-purple-100 inline-flex">
        <button onclick="switchTab('daily')" id="tab-daily" class="tab-btn bg-purple-700 text-white px-6 py-2 rounded-lg font-bold text-sm transition-all shadow-md">日別</button>
        <button onclick="switchTab('weekly')" id="tab-weekly" class="tab-btn text-purple-400 hover:bg-purple-50 px-6 py-2 rounded-lg font-bold text-sm transition-all">週別</button>
        <button onclick="switchTab('monthly_days')" id="tab-monthly_days" class="tab-btn text-purple-400 hover:bg-purple-50 px-6 py-2 rounded-lg font-bold text-sm transition-all">月間売上</button>
        <button onclick="switchTab('monthly')" id="tab-monthly" class="tab-btn text-purple-400 hover:bg-purple-50 px-6 py-2 rounded-lg font-bold text-sm transition-all">月別</button>
        <button onclick="switchTab('yearly')" id="tab-yearly" class="tab-btn text-purple-400 hover:bg-purple-50 px-6 py-2 rounded-lg font-bold text-sm transition-all">年別</button>
      </div>
    </div>

    <div class="grid grid-cols-3 gap-6 mb-8 shrink-0">
      <div class="bg-white p-6 rounded-2xl shadow-sm border border-purple-100 relative overflow-hidden">
        <div class="absolute left-0 top-0 bottom-0 w-2 bg-purple-600"></div>
        <p id="summary-title-sales" class="text-purple-400 text-sm font-bold mb-2 uppercase tracking-wider">本日合計売上（税込）</p>
        <p id="summary-val-sales" class="text-4xl font-black text-slate-800">¥ 0</p>
      </div>
      <div class="bg-white p-6 rounded-2xl shadow-sm border border-purple-100 relative overflow-hidden">
        <div class="absolute left-0 top-0 bottom-0 w-2 bg-fuchsia-500"></div>
        <p id="summary-title-count" class="text-purple-400 text-sm font-bold mb-2 uppercase tracking-wider">本日客数</p>
        <p id="summary-val-count" class="text-4xl font-black text-slate-800">0 <span class="text-lg font-bold text-slate-400">名</span></p>
      </div>
      <div class="bg-white p-6 rounded-2xl shadow-sm border border-purple-100 relative overflow-hidden">
        <div class="absolute left-0 top-0 bottom-0 w-2 bg-indigo-500"></div>
        <p id="summary-title-average" class="text-purple-400 text-sm font-bold mb-2 uppercase tracking-wider">本日客単価</p>
        <p id="summary-val-average" class="text-4xl font-black text-slate-800">¥ 0</p>
      </div>
    </div>

    <div class="flex-grow flex gap-6 overflow-hidden">
      <div class="w-7/12 bg-white rounded-2xl shadow-lg border border-purple-100 overflow-hidden flex flex-col">
        <div class="p-6 border-b border-purple-50 flex justify-between items-center shrink-0">
          <h3 class="text-lg font-black text-slate-700 flex items-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-2 text-purple-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
            </svg>
            <span id="table-title-text">本日の取引詳細</span>
          </h3>
        </div>
        
        <div class="overflow-y-auto flex-grow custom-scrollbar p-6 pt-0">
          <table class="w-full text-left border-collapse table-fixed">
            <thead class="sticky top-0 bg-white text-purple-300 text-sm font-bold border-b-2 border-purple-50 z-10">
              <tr>
                <th class="py-4 px-2 w-1/4">集計単位 / 日時</th>
                <th class="py-4 px-2 w-1/4">商品詳細</th>
                <th class="py-4 px-2 text-right w-1/8">単価</th>
                <th class="py-4 px-2 text-center w-1/12">個数</th>
                <th class="py-4 px-2 text-right w-1/8">小計</th>
                <th class="py-4 px-2 text-right w-1/6">合計(税込)</th>
              </tr>
            </thead>
            <tbody id="sales-tbody" class="divide-y divide-purple-50">
            </tbody>
          </table>
        </div>
      </div>

      <div class="w-5/12 bg-white text-slate-800 p-6 rounded-2xl shadow-lg border border-purple-100 flex flex-col shrink-0">
        <div class="mb-4 flex justify-between items-end">
          <div>
            <span class="text-purple-400 text-sm font-bold block">合計</span>
            <div>
              <span id="chart-total-sales" class="text-4xl font-black font-mono tracking-tight text-slate-800">0</span>
              <span class="text-xl font-bold ml-1 text-slate-500">円</span>
            </div>
            <span class="text-slate-400 text-xs block mt-1" id="chart-date-label">本日の売上推移</span>
          </div>
          
          <div id="period-controls" class="flex gap-2 mb-1">
            <button onclick="changePeriod(-1)" class="w-8 h-8 flex items-center justify-center bg-purple-100 text-purple-600 rounded-lg hover:bg-purple-700 hover:text-white transition-colors font-bold shadow-sm" title="前の期間へ">
              &lt;
            </button>
            <button onclick="changePeriod(1)" class="w-8 h-8 flex items-center justify-center bg-purple-100 text-purple-600 rounded-lg hover:bg-purple-700 hover:text-white transition-colors font-bold shadow-sm" title="次の期間へ">
              &gt;
            </button>
          </div>
        </div>
        
        <div class="relative w-full flex-grow min-h-[250px]">
          <canvas id="revenueChart"></canvas>
        </div>
      </div>
    </div>
  </main>

<footer class="admin-footer">
  <div class="footer-left"></div>
  <div class="footer-right">Admin Mode</div>
</footer>

  <script>
    let revenueChart; 
    let currentPeriod = 'daily'; 
    let currentBaseDate = new Date(); // 現在表示している基準日
    let globalDetails = [];           // APIから取得した全データを保持
    let isFirstLoadForTab = true;     // タブ切り替え直後かを判定

    window.onload = () => {
      initChart(); 
      loadSalesData('daily'); 
      updateClock();
      setInterval(updateClock, 1000);
    };

    function updateClock() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const day = String(now.getDate()).padStart(2, '0');
      const daysOfWeek = ['日', '月', '火', '水', '木', '金', '土'];
      const dayOfWeek = daysOfWeek[now.getDay()];
      const dateString = `${year}/${month}/${day} (${dayOfWeek})`;
      
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const seconds = String(now.getSeconds()).padStart(2, '0');
      const timeString = `${hours}:${minutes}:${seconds}`;
      
      const dateEl = document.getElementById('current-date');
      const timeEl = document.getElementById('current-time');
      
      if (dateEl) dateEl.textContent = dateString;
      if (timeEl) timeEl.textContent = timeString;
    }

    function initChart() {
      const ctx = document.getElementById('revenueChart').getContext('2d');
      revenueChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: [],
          datasets: [{
            label: '売上高',
            data: [],
            backgroundColor: '#7e22ce', 
            hoverBackgroundColor: '#6b21a8', 
            borderRadius: 4,
            barThickness: 10, 
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#1e1b4b', 
              titleColor: '#fff',
              bodyColor: '#fff',
              callbacks: {
                label: function(context) {
                  return '売上: ¥' + context.raw.toLocaleString();
                }
              }
            }
          },
          scales: {
            x: {
              grid: { display: false },
              ticks: { 
                color: '#64748b', 
                maxRotation: 0, 
                autoSkip: false, 
                font: { size: 9 } 
              }
            },
            y: {
              position: 'right', 
              grid: { color: '#f1f5f9', borderDash: [3, 3] },
              ticks: { color: '#64748b', callback: function(value) { return value.toLocaleString(); } },
              beginAtZero: true
            }
          }
        }
      });
    }

    function toggleGroup(groupId) {
      const detailRows = document.querySelectorAll(`.detail-of-${groupId}`);
      const icon = document.getElementById(`icon-${groupId}`);
      
      detailRows.forEach(row => {
        if (row.style.display === 'table-row') {
          row.style.display = 'none';
        } else {
          row.style.display = 'table-row';
        }
      });
      
      if (icon) {
        icon.classList.toggle('rotated');
      }
    }

    function changePeriod(offset) {
      if (currentPeriod === 'daily') {
        currentBaseDate.setDate(currentBaseDate.getDate() + offset);
      } else if (currentPeriod === 'weekly') {
        currentBaseDate.setDate(currentBaseDate.getDate() + offset * 7);
      } else if (currentPeriod === 'monthly_days') {
        currentBaseDate.setMonth(currentBaseDate.getMonth() + offset);
      } else if (currentPeriod === 'monthly') {
        currentBaseDate.setFullYear(currentBaseDate.getFullYear() + offset);
      }
      updateChartAndTable(currentPeriod, globalDetails);
    }

    function updateChartAndTable(period, details) {
      if (!revenueChart) return;

      let newLabels = [];
      let newData = [];
      let displayTotalSales = 0; 

      const processedTx = new Set();
      const tbody = document.getElementById('sales-tbody');
      tbody.innerHTML = ''; 

      // 基準日をセット
      let baseDate = new Date(currentBaseDate.getTime());

      const currentDayIdx = baseDate.getDay(); 
      const startOfWeek = new Date(baseDate);
      startOfWeek.setDate(baseDate.getDate() - currentDayIdx);
      startOfWeek.setHours(0, 0, 0, 0);

      const endOfWeek = new Date(startOfWeek);
      endOfWeek.setDate(startOfWeek.getDate() + 6);
      endOfWeek.setHours(23, 59, 59, 999);

      let targetYear = baseDate.getFullYear();
      let targetMonth = baseDate.getMonth() + 1;
      let targetDateStr = `${targetMonth}/${baseDate.getDate()}`;

      let chartLabelText = "";
      let summaryPrefix = "";

      if (period === 'daily') {
        newLabels = Array.from({length: 24}, (_, i) => `${i}時`);
        newData = Array(24).fill(0);
        chartLabelText = `${targetYear}/${targetDateStr} の売上推移`;
        summaryPrefix = `${targetDateStr}`;
      } 
      else if (period === 'weekly') {
        newLabels = ['日', '月', '火', '水', '木', '金', '土'].map((day, idx) => {
          const d = new Date(startOfWeek);
          d.setDate(startOfWeek.getDate() + idx);
          return `${day}(${d.getMonth() + 1}/${d.getDate()})`;
        });
        newData = Array(7).fill(0);
        const startStr = `${startOfWeek.getMonth() + 1}/${startOfWeek.getDate()}`;
        const endStr = `${endOfWeek.getMonth() + 1}/${endOfWeek.getDate()}`;
        chartLabelText = `週間の売上推移 (${startStr} 〜 ${endStr})`;
        summaryPrefix = `週間(${startStr}〜${endStr})`;
      }
      else if (period === 'monthly_days') {
        const daysInMonth = new Date(targetYear, targetMonth, 0).getDate();
        newLabels = Array.from({length: daysInMonth}, (_, i) => `${i + 1}日`);
        newData = Array(daysInMonth).fill(0);
        chartLabelText = `${targetYear}年${targetMonth}月度の売上推移`;
        summaryPrefix = `${targetYear}年${targetMonth}月度`;
      }
      else if (period === 'monthly') {
        newLabels = Array.from({length: 12}, (_, i) => `${i + 1}月`);
        newData = Array(12).fill(0);
        chartLabelText = `${targetYear}年の月別売上推移`;
        summaryPrefix = `${targetYear}年`;
      } 
      else if (period === 'yearly') {
        const yearMap = {};
        details.forEach(item => {
          const datePart = item.time.split(' ')[0];
          const yearStr = datePart.includes('-') ? datePart.split('-')[0] : datePart.split('/')[0];
          if (yearStr) yearMap[`${yearStr}年`] = 0;
        });
        newLabels = Object.keys(yearMap).sort();
        newData = Array(newLabels.length).fill(0);
        chartLabelText = `年別の売上推移`;
        summaryPrefix = `年別`;
      }

      // 各種ラベルの更新
      const chartDateLabel = document.getElementById('chart-date-label');
      if (chartDateLabel) chartDateLabel.textContent = chartLabelText;
      
      const tableTitle = document.getElementById('table-title-text');
      if (tableTitle) tableTitle.textContent = `${summaryPrefix} の取引詳細`;

      const titleSales = document.getElementById('summary-title-sales');
      const titleCount = document.getElementById('summary-title-count');
      const titleAverage = document.getElementById('summary-title-average');
      if (titleSales) titleSales.textContent = `${summaryPrefix} 合計売上`;
      if (titleCount) titleCount.textContent = `${summaryPrefix} 客数`;
      if (titleAverage) titleAverage.textContent = `${summaryPrefix} 客単価`;

      const periodControls = document.getElementById('period-controls');
      if (periodControls) {
        periodControls.style.display = (period === 'yearly') ? 'none' : 'flex';
      }

      const groupMap = {};
      const uniqueTxIdSet = new Set(); 

      // データのフィルタリング
      details.forEach(item => {
        const datePart = item.time.split(' ')[0];
        const timePart = item.time.includes(' ') ? item.time.split(' ')[1] : item.time;
        const itemDate = new Date(datePart.replace(/-/g, '/'));
        
        let parts = datePart.includes('-') ? datePart.split('-') : datePart.split('/');
        let itemYear = parseInt(parts[0], 10);
        let itemMonth = parseInt(parts[1], 10);
        let itemDay = parseInt(parts[2], 10);

        let isValidPeriod = false;
        let chartIndex = -1;
        let groupKey = "";  
        let subKey = "";    

        if (period === 'daily') {
          if (itemYear === targetYear && itemMonth === targetMonth && itemDay === baseDate.getDate()) {
            const hour = parseInt(timePart.split(':')[0], 10);
            if (!isNaN(hour) && hour >= 0 && hour < 24) {
              chartIndex = hour;
              isValidPeriod = true;
            }
          }
        } 
        else if (period === 'weekly') {
          if (!isNaN(itemDate) && itemDate >= startOfWeek && itemDate <= endOfWeek) {
            chartIndex = itemDate.getDay();
            isValidPeriod = true;
            groupKey = `${itemMonth}月${itemDay}日`;
            subKey = timePart.substring(0, 5); 
          }
        }
        else if (period === 'monthly_days') {
          if (itemYear === targetYear && itemMonth === targetMonth) {
            if (!isNaN(itemDay) && itemDay >= 1 && itemDay <= newData.length) {
              chartIndex = itemDay - 1;
              isValidPeriod = true;
              groupKey = `${itemMonth}月${itemDay}日`;
              subKey = timePart.substring(0, 5); 
            }
          }
        }
        else if (period === 'monthly') {
          if (itemYear === targetYear) {
            if (!isNaN(itemMonth) && itemMonth >= 1 && itemMonth <= 12) {
              chartIndex = itemMonth - 1;
              isValidPeriod = true;
              groupKey = `${itemMonth}月`;
              subKey = `${itemDay}日`; 
            }
          }
        }
        else if (period === 'yearly') {
          const labelStr = `${itemYear}年`;
          chartIndex = newLabels.indexOf(labelStr);
          if (chartIndex !== -1) {
            isValidPeriod = true;
            groupKey = labelStr;
            subKey = `${itemMonth}月`; 
          }
        }

        if (isValidPeriod) {
          const txKey = item.time;
          uniqueTxIdSet.add(txKey);

          if (!processedTx.has(txKey)) {
            newData[chartIndex] += parseInt(item.total_amount, 10) || 0;
            displayTotalSales += parseInt(item.total_amount, 10) || 0;
            processedTx.add(txKey);
          }

          if (period !== 'daily') {
            if (!groupMap[groupKey]) {
              groupMap[groupKey] = { subGroups: {} };
            }
            if (!groupMap[groupKey].subGroups[subKey]) {
              groupMap[groupKey].subGroups[subKey] = {
                amount: 0,
                txKeys: new Set(),
                productSummary: {} 
              };
            }
            
            const sub = groupMap[groupKey].subGroups[subKey];
            
            if (!sub.txKeys.has(txKey)) {
              sub.amount += parseInt(item.total_amount, 10) || 0;
              sub.txKeys.add(txKey);
            }

            if (!sub.productSummary[item.product_name]) {
              sub.productSummary[item.product_name] = {
                price: parseInt(item.price, 10),
                quantity: 0,
                subtotal: 0
              };
            }
            sub.productSummary[item.product_name].quantity += parseInt(item.quantity, 10);
            sub.productSummary[item.product_name].subtotal += parseInt(item.subtotal, 10);
          }
        }
      });

      // サマリーカード更新
      const summarySalesEl = document.getElementById('summary-val-sales');
      const summaryCountEl = document.getElementById('summary-val-count');
      const summaryAverageEl = document.getElementById('summary-val-average');

      if (summarySalesEl && summaryCountEl && summaryAverageEl) {
        const totalCount = uniqueTxIdSet.size;
        const averageSales = totalCount > 0 ? Math.round(displayTotalSales / totalCount) : 0;

        summarySalesEl.textContent = `¥ ${displayTotalSales.toLocaleString()}`;
        summaryCountEl.innerHTML = `${totalCount} <span class="text-lg font-bold text-slate-400">名</span>`;
        summaryAverageEl.textContent = `¥ ${averageSales.toLocaleString()}`;
      }

      // テーブル出力
      if (period === 'daily') {
        details.forEach(item => {
          const datePart = item.time.split(' ')[0];
          let parts = datePart.includes('-') ? datePart.split('-') : datePart.split('/');
          let itemYear = parseInt(parts[0], 10);
          let itemMonth = parseInt(parts[1], 10);
          let itemDay = parseInt(parts[2], 10);

          if (itemYear === targetYear && itemMonth === targetMonth && itemDay === baseDate.getDate()) {
            const timePart = item.time.includes(' ') ? item.time.split(' ')[1] : item.time;
            const hour = parseInt(timePart.split(':')[0], 10);
            if (!isNaN(hour) && hour >= 0 && hour < 24) {
              const rowHTML = `
                <tr class="hover:bg-purple-50/50 transition-colors border-b border-purple-50">
                  <td class="py-4 px-2 text-slate-400 font-mono text-xs">${timePart}</td>
                  <td class="py-4 px-2 font-bold text-slate-800 text-sm truncate">${item.product_name}</td>
                  <td class="py-4 px-2 text-right text-slate-600 text-sm">¥${parseInt(item.price).toLocaleString()}</td>
                  <td class="py-4 px-2 text-center text-slate-600 text-sm">${item.quantity}</td>
                  <td class="py-4 px-2 text-right text-slate-600 text-sm">¥${parseInt(item.subtotal).toLocaleString()}</td>
                  <td class="py-4 px-2 text-right font-black text-base text-slate-800 border-l border-purple-50">¥${parseInt(item.total_amount).toLocaleString()}</td>
                </tr>
              `;
              tbody.insertAdjacentHTML('beforeend', rowHTML);
            }
          }
        });
      } else {
        let uniqueIdCounter = 0;
        
        Object.keys(groupMap).forEach(key => {
          uniqueIdCounter++;
          const group = groupMap[key];
          
          let groupTotal = 0;
          Object.keys(group.subGroups).forEach(sk => {
            groupTotal += group.subGroups[sk].amount;
          });

          const subKeysCount = Object.keys(group.subGroups).length;
          let labelTypeText = "取引数";
          if (period === 'monthly') labelTypeText = "営業日数";
          if (period === 'yearly') labelTypeText = "営業月数";

          const summaryRowHTML = `
            <tr onclick="toggleGroup(${uniqueIdCounter})" class="summary-row bg-purple-50/30 font-bold border-b border-purple-100">
              <td class="py-4 px-2 text-purple-700 font-black text-sm flex items-center">
                <svg id="icon-${uniqueIdCounter}" xmlns="http://www.w3.org/2000/svg" class="toggle-icon h-4 w-4 mr-1 text-purple-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7" />
                </svg>
                ${key} 合計
              </td>
              <td class="py-4 px-2 text-slate-400 text-xs text-left" colspan="4">${labelTypeText}: ${subKeysCount}件</td>
              <td class="py-4 px-2 text-right text-purple-900 font-black text-base border-l border-purple-50">¥${groupTotal.toLocaleString()}</td>
            </tr>
          `;
          tbody.insertAdjacentHTML('beforeend', summaryRowHTML);

          let lastSubKey = "";
          const sortedSubKeys = Object.keys(group.subGroups).sort((a, b) => {
            return parseFloat(a) - parseFloat(b) || a.localeCompare(b);
          });

          sortedSubKeys.forEach((subKey, subKeyIndex) => {
            const subData = group.subGroups[subKey];
            const productNames = Object.keys(subData.productSummary);
            
            productNames.forEach((prodName, prodIndex) => {
              const prod = subData.productSummary[prodName];
              
              let displaySubKey = "";
              if (subKey !== lastSubKey) {
                displaySubKey = subKey;
                lastSubKey = subKey;
              }

              const isLastProductInSubGroup = (prodIndex === productNames.length - 1);
              const isLastSubKeyInGroup = (subKeyIndex === sortedSubKeys.length - 1);
              
              const separatorClass = (isLastProductInSubGroup && !isLastSubKeyInGroup) ? "group-separator-row" : "";

              const detailRowHTML = `
                <tr class="detail-row detail-of-${uniqueIdCounter} border-b border-slate-100 ${separatorClass}">
                  <td class="py-3 px-2 pl-7 text-purple-600 font-bold text-xs">${displaySubKey}</td>
                  <td class="py-3 px-2 text-slate-700 font-medium text-sm truncate">${prodName}</td>
                  <td class="py-3 px-2 text-right text-slate-500 text-xs">¥${prod.price.toLocaleString()}</td>
                  <td class="py-3 px-2 text-center text-slate-500 text-xs">${prod.quantity}</td>
                  <td class="py-3 px-2 text-right text-slate-500 text-xs">¥${prod.subtotal.toLocaleString()}</td>
                  <td class="py-3 px-2 text-right text-slate-600 font-bold text-sm border-l border-purple-50/50">
                    ${displaySubKey !== "" ? `¥${subData.amount.toLocaleString()}` : ""}
                  </td>
                </tr>
              `;
              tbody.insertAdjacentHTML('beforeend', detailRowHTML);
            });
          });
        });
      }

      const chartTotalEl = document.getElementById('chart-total-sales');
      if (chartTotalEl) chartTotalEl.textContent = displayTotalSales.toLocaleString();

      revenueChart.data.labels = newLabels;
      revenueChart.data.datasets[0].data = newData;
      
      const maxVal = Math.max(...newData);
      revenueChart.options.scales.y.suggestedMax = maxVal > 0 ? maxVal * 1.2 : 1000;

      if (period === 'monthly_days') {
        revenueChart.options.scales.x.ticks.autoSkip = false; 
        revenueChart.data.datasets[0].barThickness = undefined; 
      } else if (period === 'weekly') {
        revenueChart.options.scales.x.ticks.autoSkip = false;
        revenueChart.data.datasets[0].barThickness = 24; 
      } else {
        revenueChart.options.scales.x.ticks.autoSkip = true;
        revenueChart.options.scales.x.ticks.maxTicksLimit = 12;
        revenueChart.data.datasets[0].barThickness = 10;
      }

      revenueChart.update();
    }

    async function loadSalesData(period) {
      try {
        currentPeriod = period; 
        
        // ★ 修正：全期間・全日付を自由に「＜ ＞」で行き来できるように、
        // どのタブを開いても、APIからは常に広範囲（年間）のデータを取得してフロントに保持しておく
        const apiPeriod = 'yearly';
        const response = await fetch(`../../backend/api/get_sales_data.php?period=${apiPeriod}`);
        const data = await response.json();

        if (!data.success) {
          console.error("データ取得エラー:", data.error);
          return;
        }

        globalDetails = data.details;

        // ★ 修正：タブを切り替えた時の「初期基準日」を、取得したデータの中で一番新しい日付にする
        if (isFirstLoadForTab) {
          if (globalDetails.length > 0) {
            let latestDate = new Date(0);
            globalDetails.forEach(item => {
              const d = new Date(item.time.split(' ')[0].replace(/-/g, '/'));
              if (d > latestDate) latestDate = d;
            });
            currentBaseDate = latestDate;
          } else {
            currentBaseDate = new Date(); 
          }
          isFirstLoadForTab = false;
        }

        updateChartAndTable(period, globalDetails);

      } catch (error) {
        console.error("通信エラーが発生しました:", error);
      }
    }

    function switchTab(period) {
      const tabs = document.querySelectorAll('.tab-btn');
      tabs.forEach(tab => {
        tab.classList.remove('bg-purple-700', 'text-white', 'shadow-md');
        tab.classList.add('text-purple-400', 'hover:bg-purple-50');
      });
      const activeTab = document.getElementById('tab-' + period);
      activeTab.classList.remove('text-purple-400', 'hover:bg-purple-50');
      activeTab.classList.add('bg-purple-700', 'text-white', 'shadow-md');

      isFirstLoadForTab = true; 
      loadSalesData(period);
    }
  </script>
</body>
</html>
