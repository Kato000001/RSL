<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>売上分析画面 - 野菜屋レジ管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* カスタムスクロールバーを紫系統に */
    .custom-scrollbar::-webkit-scrollbar { width: 8px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: #f5f3ff; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #ddd6fe; border-radius: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #c4b5fd; }
  </style>
</head>
<body class="bg-violet-50 h-screen w-screen flex flex-col font-sans select-none overflow-hidden text-slate-800">

  <header class="bg-purple-900 p-4 flex justify-between items-center shrink-0 shadow-lg text-white">
    <div class="flex items-center space-x-3">
      <div class="w-8 h-8 bg-purple-700 rounded flex items-center justify-center text-sm font-bold shadow-inner border border-purple-500">管</div>
      <span class="text-lg font-bold tracking-wider">新鮮野菜 産直ポス - 売上管理システム</span>
    </div>
    <div class="flex items-center space-x-4">
      <span class="text-sm bg-purple-800/50 px-4 py-1.5 rounded-full text-purple-100 border border-purple-700">2024年5月20日(月) 接続中</span>
      <a href="mastermenu.html" class="bg-purple-700 hover:bg-purple-600 active:bg-purple-800 active:scale-95 transition-all text-white text-sm font-bold px-5 py-2 rounded-lg shadow-sm no-underline flex items-center border border-purple-500">
        管理者メニューへ戻る
      </a>
    </div>
  </header>

  <main class="flex-grow flex flex-col p-8 overflow-hidden">
    
    <div class="flex justify-center mb-6 shrink-0">
      <div class="bg-white p-1 rounded-xl shadow-md border border-purple-100 inline-flex">
        <button onclick="switchTab('daily')" id="tab-daily" class="tab-btn bg-purple-700 text-white px-8 py-2 rounded-lg font-bold text-sm transition-all shadow-md">日別</button>
        <button onclick="switchTab('weekly')" id="tab-weekly" class="tab-btn text-purple-400 hover:bg-purple-50 px-8 py-2 rounded-lg font-bold text-sm transition-all">週別</button>
        <button onclick="switchTab('monthly')" id="tab-monthly" class="tab-btn text-purple-400 hover:bg-purple-50 px-8 py-2 rounded-lg font-bold text-sm transition-all">月別</button>
        <button onclick="switchTab('yearly')" id="tab-yearly" class="tab-btn text-purple-400 hover:bg-purple-50 px-8 py-2 rounded-lg font-bold text-sm transition-all">年別</button>
      </div>
    </div>

    <div class="grid grid-cols-4 gap-6 mb-8 shrink-0">
      <div class="bg-white p-6 rounded-2xl shadow-sm border border-purple-100 relative overflow-hidden">
        <div class="absolute left-0 top-0 bottom-0 w-2 bg-purple-600"></div>
        <p id="summary-title" class="text-purple-400 text-sm font-bold mb-2 uppercase tracking-wider">本日合計売上（税込）</p>
        <p class="text-4xl font-black text-slate-800">¥ 124,857</p>
      </div>
      <div class="bg-white p-6 rounded-2xl shadow-sm border border-purple-100 relative overflow-hidden">
        <div class="absolute left-0 top-0 bottom-0 w-2 bg-fuchsia-500"></div>
        <p class="text-purple-400 text-sm font-bold mb-2 uppercase tracking-wider">客数</p>
        <p class="text-4xl font-black text-slate-800">142 <span class="text-lg font-bold text-slate-400">名</span></p>
      </div>
      <div class="bg-white p-6 rounded-2xl shadow-sm border border-purple-100 relative overflow-hidden">
        <div class="absolute left-0 top-0 bottom-0 w-2 bg-indigo-500"></div>
        <p class="text-purple-400 text-sm font-bold mb-2 uppercase tracking-wider">客単価</p>
        <p class="text-4xl font-black text-slate-800">¥ 879</p>
      </div>
      <div class="bg-white p-6 rounded-2xl shadow-sm border border-purple-100 relative overflow-hidden">
        <div class="absolute left-0 top-0 bottom-0 w-2 bg-pink-500"></div>
        <p class="text-purple-400 text-sm font-bold mb-2 uppercase tracking-wider">目標達成率</p>
        <p class="text-4xl font-black text-slate-800">83.2 <span class="text-lg font-bold text-slate-400">%</span></p>
      </div>
    </div>

    <div class="flex-grow bg-white rounded-2xl shadow-lg border border-purple-100 overflow-hidden flex flex-col">
      <div class="p-6 border-b border-purple-50 flex justify-between items-center shrink-0">
        <h3 id="table-title" class="text-lg font-black text-slate-700 flex items-center">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-2 text-purple-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
          </svg>
          本日の取引詳細
        </h3>
        <div class="flex space-x-3">
          <button class="px-4 py-2 border border-purple-200 rounded-lg text-sm font-bold text-purple-600 hover:bg-purple-50 transition-colors">CSV出力</button>
          <button class="px-4 py-2 border border-purple-200 rounded-lg text-sm font-bold text-purple-600 hover:bg-purple-50 transition-colors">印刷</button>
        </div>
      </div>
      
      <div class="overflow-y-auto flex-grow custom-scrollbar p-6 pt-0">
        <table class="w-full text-left border-collapse">
          <thead class="sticky top-0 bg-white text-purple-300 text-sm font-bold border-b-2 border-purple-50">
            <tr>
              <th class="py-4 px-2">時刻</th>
              <th class="py-4 px-2">商品詳細</th>
              <th class="py-4 px-2 text-right">単価</th>
              <th class="py-4 px-2 text-center">個数</th>
              <th class="py-4 px-2 text-right">小計</th>
              <th class="py-4 px-2 text-right w-32">合計(税込)</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-purple-50">
            <tr class="hover:bg-purple-50/50 transition-colors">
              <td class="py-4 px-2 text-slate-400 font-mono text-sm">14:32:10</td>
              <td class="py-4 px-2 font-bold text-slate-800">バナナ</td>
              <td class="py-4 px-2 text-right text-slate-600">¥500</td>
              <td class="py-4 px-2 text-center text-slate-600">1</td>
              <td class="py-4 px-2 text-right text-slate-600">¥500</td>
              <td class="py-4 px-2 text-right font-black text-xl text-slate-800 border-l border-purple-50">¥550</td>
            </tr>
            <tr class="hover:bg-purple-50/50 transition-colors">
              <td class="py-4 px-2 text-slate-400 font-mono text-sm">14:28:45</td>
              <td class="py-4 px-2 font-bold text-slate-800">キャベツ</td>
              <td class="py-4 px-2 text-right text-slate-600">¥200</td>
              <td class="py-4 px-2 text-center text-slate-600">2</td>
              <td class="py-4 px-2 text-right text-slate-600">¥400</td>
              <td class="py-4 px-2 text-right font-black text-xl text-slate-800 border-l border-purple-50">¥440</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>

  <footer class="bg-purple-950 text-purple-400 p-2 text-xs text-center shrink-0 border-t border-purple-800">
    Administration Sales Report Mode - Fresh Veggie POS System
  </footer>

  <script>
    // ページが開いた瞬間に「今日(daily)」のデータを読み込む
    window.onload = () => {
      loadSalesData('daily');
    };

    // データベースからデータを取ってきて画面を書き換える関数
    async function loadSalesData(period) {
      try {
        // 1. PHPにデータをリクエストする（※パスは環境に合わせて調整してください）
        const response = await fetch(`../../backend/api/get_sales_data.php?period=${period}`);
        const data = await response.json();

        // エラーがあればコンソールに出して止める
        if (!data.success) {
          console.error("データ取得エラー:", data.error);
          return;
        }

        // 2. サマリー（上の4つのカード）の数字を書き換える
        const summaryElements = document.querySelectorAll('.text-4xl.font-black.text-slate-800');
        summaryElements[0].textContent = `¥ ${data.summary.sales}`; // 本日合計売上
        summaryElements[1].innerHTML = `${data.summary.count} <span class="text-lg font-bold text-slate-400">名</span>`; // 客数
        summaryElements[2].textContent = `¥ ${data.summary.average}`; // 客単価
        // （※目標達成率は今回ダミーのままにしています）

        // 3. 取引履歴テーブル（下の一覧）を書き換える
        const tbody = document.querySelector('tbody');
        tbody.innerHTML = ''; // 最初から入っているダミーの行を全部消す

        // PHPから届いたデータ(details)を1行ずつテーブルに追加する
        data.details.forEach(item => {
          // 時刻の文字を見やすくする（例: "2024-05-20 14:32:10" → "14:32:10"）
          const timeOnly = item.time.split(' ')[1];

          const rowHTML = `
            <tr class="hover:bg-purple-50/50 transition-colors border-b border-purple-50">
              <td class="py-4 px-2 text-slate-400 font-mono text-sm">${timeOnly}</td>
              <td class="py-4 px-2 font-bold text-slate-800">${item.product_name}</td>
              <td class="py-4 px-2 text-right text-slate-600">¥${item.price}</td>
              <td class="py-4 px-2 text-center text-slate-600">${item.quantity}</td>
              <td class="py-4 px-2 text-right text-slate-600">¥${item.subtotal}</td>
              <td class="py-4 px-2 text-right font-black text-xl text-slate-800 border-l border-purple-50">¥${item.total_amount}</td>
            </tr>
          `;
          tbody.insertAdjacentHTML('beforeend', rowHTML);
        });

      } catch (error) {
        console.error("通信エラーが発生しました:", error);
      }
    }

    // タブ（日別・週別など）を切り替える関数
    function switchTab(period) {
      // 1. タブの色を変更する（デザイン処理）
      const tabs = document.querySelectorAll('.tab-btn');
      tabs.forEach(tab => {
        tab.classList.remove('bg-purple-700', 'text-white', 'shadow-md');
        tab.classList.add('text-purple-400', 'hover:bg-purple-50');
      });
      const activeTab = document.getElementById('tab-' + period);
      activeTab.classList.remove('text-purple-400', 'hover:bg-purple-50');
      activeTab.classList.add('bg-purple-700', 'text-white', 'shadow-md');

      // 2. タイトルの文字を変更する
      const summaryTitle = document.getElementById('summary-title');
      const tableTitle = document.getElementById('table-title');
      
      let prefix = "";
      if(period === 'daily') prefix = "本日";
      if(period === 'weekly') prefix = "今週";
      if(period === 'monthly') prefix = "今月";
      if(period === 'yearly') prefix = "今年";

      summaryTitle.textContent = `${prefix}合計売上（税込）`;
      tableTitle.innerHTML = `
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-2 text-purple-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
        </svg>
        ${prefix}の取引詳細
      `;

      // 3. 選んだ期間のデータを新しく読み込み直す！
      loadSalesData(period);
    }
  </script>
</body>
</html>
